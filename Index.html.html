
<h2 class="sr-only">Oxi Fresh Carpet Cleaning — Interactive Inbound Call Flow Agent Guide</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.cf{font-family:var(--font-sans);padding:0.5rem 0 1rem}
.hdr{background:#121b35;border-radius:var(--border-radius-lg);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.hdr-logo{background:#1e2d4f;border-radius:var(--border-radius-md);padding:6px 10px;display:flex;align-items:center;gap:8px}
.hdr-logo span{font-size:18px;font-weight:500;color:#fff;letter-spacing:-0.5px}
.hdr-logo span em{color:#ef4444;font-style:normal}
.hdr-text{flex:1}
.hdr-text p{color:#94a3b8;font-size:12px;margin-top:2px}
.hdr-text h1{color:#fff;font-size:14px;font-weight:500}
.agent-row{display:flex;align-items:center;gap:8px}
.agent-row label{color:#94a3b8;font-size:12px;white-space:nowrap}
.agent-row input{background:#1e2d4f;border:0.5px solid #334155;color:#fff;border-radius:var(--border-radius-md);padding:5px 9px;font-size:13px;width:120px}
.agent-row input::placeholder{color:#64748b}
.new-btn{background:transparent;border:0.5px solid #334155;color:#94a3b8;border-radius:var(--border-radius-md);padding:5px 10px;font-size:12px;cursor:pointer}
.new-btn:hover{background:#1e2d4f}
.prog{display:flex;gap:0;margin-bottom:12px;border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.pstep{flex:1;padding:7px 4px;text-align:center;font-size:11px;cursor:pointer;transition:.2s;color:var(--color-text-secondary);background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);line-height:1.3}
.pstep:last-child{border-right:none}
.pstep.done{background:#e0fdf4;color:#0f6e56}
.pstep.active{background:#c0392b;color:#fff;font-weight:500}
.pstep:hover:not(.active){background:var(--color-background-secondary)}
.pstep .pnum{display:block;font-size:10px;opacity:.7;margin-bottom:1px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px}
.card-red{border-left:3px solid #c0392b;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0;padding-left:14px}
.slbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#c0392b;margin-bottom:4px}
.sbox{background:#fff8f8;border:0.5px solid #fca5a5;border-radius:var(--border-radius-md);padding:10px 12px;font-style:italic;font-size:13px;line-height:1.65;color:var(--color-text-primary);margin-bottom:10px}
.ibox{background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:var(--color-text-info);margin-bottom:10px;line-height:1.55}
.wbox{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:var(--color-text-warning);margin-bottom:10px;line-height:1.55}
.gbox{background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:var(--color-text-success);margin-bottom:10px;line-height:1.55}
.dbox{background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:var(--color-text-danger);margin-bottom:10px;line-height:1.55}
.pbox{background:#fdf4ff;border:0.5px solid #e9d5ff;border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:#6b21a8;margin-bottom:10px;line-height:1.55}
.box-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;display:block}
.flbl{font-size:12.5px;font-weight:500;color:var(--color-text-secondary);margin-top:10px;margin-bottom:4px;display:block}
input[type=text],select,textarea{width:100%;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 10px;font-size:13px;color:var(--color-text-primary);background:var(--color-background-primary);font-family:var(--font-sans)}
textarea{min-height:60px;resize:vertical}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.btn{padding:6px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:12.5px;color:var(--color-text-primary);transition:.15s;white-space:nowrap;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn.on{background:#fef2f2;border-color:#c0392b;color:#c0392b;font-weight:500}
.btn.pri{background:#c0392b;color:#fff;border-color:#c0392b;font-weight:500}
.btn.pri:hover{background:#991b1b}
.btn.sec{background:var(--color-background-primary);color:var(--color-text-secondary);border-color:var(--color-border-secondary)}
.cnt-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.cnt-row:last-child{border-bottom:none}
.cnt-l{flex:1;font-size:12.5px;color:var(--color-text-primary);line-height:1.4}
.cnt-n{font-size:11px;color:var(--color-text-secondary);display:block;margin-top:1px}
.cnt-c{display:flex;align-items:center;gap:7px;flex-shrink:0}
.cb{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:16px;color:var(--color-text-primary);display:flex;align-items:center;justify-content:center;line-height:1}
.cb:hover{background:var(--color-background-secondary)}
.cv{font-size:14px;font-weight:500;min-width:20px;text-align:center;color:var(--color-text-primary)}
.asum{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;margin-bottom:10px;border:0.5px solid var(--color-border-tertiary)}
.al{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12.5px}
.al:last-child{border-bottom:none}
.sum-tbl{width:100%;font-size:12.5px;border-collapse:collapse}
.sum-tbl td{padding:5px 4px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top;color:var(--color-text-primary)}
.sum-tbl td:first-child{color:var(--color-text-secondary);width:40%;font-weight:500}
hr.div{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0}
.zip-ok{background:#f0fdf4;border:0.5px solid #86efac;border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:#166534;margin:8px 0}
.zip-no{background:#fef2f2;border:0.5px solid #fca5a5;border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:#7f1d1d;margin:8px 0}
.zip-ap{background:#fffbeb;border:0.5px solid #fde68a;border-radius:var(--border-radius-md);padding:9px 12px;font-size:12.5px;color:#78350f;margin:8px 0}
.step-hdr{background:#121b35;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:12px}
.step-hdr .sn{font-size:10px;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase}
.step-hdr h2{color:#fff;font-size:16px;font-weight:500;margin-top:2px}
.step-hdr p{color:#cbd5e1;font-size:12px;margin-top:3px}
.nhi{background:#fef2f2;border:0.5px solid #fecaca;border-radius:4px;padding:1px 7px;font-style:normal;font-weight:500;color:#c0392b}
.sec-t{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:8px;margin-top:4px}
.note{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-top:3px}
.tone-bar{background:#121b35;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:12px}
.tone-bar p{color:#cbd5e1;font-size:12.5px;line-height:1.6;margin-top:3px}
.tone-bar strong{color:#fff;font-size:13px;display:block;margin-bottom:2px}
.win-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.win-tbl th{background:#121b35;color:#fff;padding:7px 8px;text-align:left;font-weight:500}
.win-tbl td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.win-tbl tr:nth-child(even) td{background:var(--color-background-secondary)}
.win-tbl td:first-child{font-weight:500;color:#c0392b}
.win-tbl td em{color:var(--color-text-secondary);font-size:11px}
</style>

<div class="cf">

<div class="hdr">
  <div class="hdr-logo">
    <i class="ti ti-droplet" style="font-size:20px;color:#3b82f6" aria-hidden="true"></i>
    <span><em>Oxi</em> Fresh</span>
  </div>
  <div class="hdr-text">
    <h1>Call Flow Guide</h1>
    <p>Inbound inquiry &middot; Agent assistant</p>
  </div>
  <div class="agent-row">
    <label>Agent:</label>
    <input type="text" id="agentIn" placeholder="Your name" oninput="S.agent=this.value;var e=document.getElementById('sn');if(e)e.textContent=this.value||'[Your Name]'">
  </div>
  <button class="new-btn" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true"></i> New call</button>
</div>

<div class="prog" id="prog"></div>
<div id="flow"></div>
</div>

<script>
var SNAMES=['Greeting','Service','ZIP','Details','Condition','Quote','Schedule','Closing'];

var ZONES={
  '32259':1,'32095':1,'32092':1,'32080':1,'32085':1,'32131':1,'32086':1,'32033':1,'32084':1,'32145':1,'32223':1,'32257':1,'32258':1,
  '32003':2,'32065':2,'32073':2,'32043':2,'32068':2,'32063':2,'32212':2,'32234':2,'32220':2,'32221':2,'32210':2,'32222':2,'32244':2,'32205':2,'32204':2,'32254':2,'32202':2,'32206':2,'32209':2,
  '32266':3,'32233':3,'32225':3,'32207':3,'32277':3,'32246':3,'32216':3,'32227':3,'32211':3,'32228':3,'32081':3,'32082':3,'32217':3,'32224':3,'32250':3,'32256':3,
  '32009':4,'32226':4,'32218':4,'32219':4,'32046':4,'32034':4,'32011':4,'32097':4,'32208':4
};
var PUTNAM=['32091','32656','32666','32140','32148','32177'];

function zipChk(z){
  if(!z)return null;
  if(PUTNAM.indexOf(z)>-1)return'approval';
  if(ZONES[z])return'ok';
  return'no';
}

var S={
  step:0,agent:'',
  fname:'',lname:'',concern:'',howHeard:'',isRepeat:null,
  zip:'',zipRes:null,
  service:'',
  carpet:{rooms:0,lshape:0,combo:0,stairs:0,sland:0,halls:0,wic:0,misc:0},
  uph:{ls:0,sofa:0,sect:0,fabric:''},
  tile:{sqft:'',know:null},lam:{sqft:'',know:null},comm:{sqft:'',know:null},
  cond:'',spots:null,spotD:'',rugs:'',furniture:'',oos:'',
  quote:'',payment:'',
  address:'',unit:'',city:'',state:'FL',zipAddr:'',
  phone:'',email:'',date:'',jobPos:'',sysTime:'',window:'',notes:''
};

function rp(){
  var h=SNAMES.map(function(s,i){
    var c=i<S.step?'done':i===S.step?'active':'';
    return '<div class="pstep '+c+'" onclick="if('+i+'<='+(S.step)+')go('+i+')" title="'+s+'"><span class="pnum">'+('0'+(i+1)).slice(-2)+'</span>'+s+'</div>';
  }).join('');
  document.getElementById('prog').innerHTML=h;
}

function go(n){S.step=n;render();}
function next(){S.step++;render();}

function sp(t){return '<div class="slbl"><i class="ti ti-message-circle" aria-hidden="true"></i> Say to customer</div><div class="sbox">'+t+'</div>';}
function ftip(t){return '<div class="pbox"><span class="box-lbl"><i class="ti ti-heart" aria-hidden="true"></i> Friendly tip</span>'+t+'</div>';}
function etip(t){return '<div class="wbox"><span class="box-lbl"><i class="ti ti-mood-heart" aria-hidden="true"></i> Empathy cue</span>'+t+'</div>';}

function cnt(lbl,k,s,note){
  var v=S[k][s]||0;
  return '<div class="cnt-row"><span class="cnt-l">'+lbl+(note?'<span class="cnt-n">'+note+'</span>':'')+'</span><div class="cnt-c"><button class="cb" onclick="adj(\''+k+'\',\''+s+'\',-1)">&#8722;</button><span class="cv" id="cv-'+k+'-'+s+'">'+v+'</span><button class="cb" onclick="adj(\''+k+'\',\''+s+'\',1)">+</button></div></div>';
}
function adj(k,s,d){S[k][s]=Math.max(0,(S[k][s]||0)+d);var e=document.getElementById('cv-'+k+'-'+s);if(e)e.textContent=S[k][s];rSum();}

function areas(){
  var c=S.carpet,ls=[];
  if(c.rooms)ls.push({l:'Standard rooms',v:c.rooms});
  if(c.lshape)ls.push({l:'L-shape rooms (x2)',v:c.lshape});
  if(c.combo)ls.push({l:'Combo rooms (x2)',v:c.combo});
  if(c.stairs)ls.push({l:'Stairwells',v:c.stairs});
  if(c.sland)ls.push({l:'Stairwells w/ landing',v:c.sland});
  if(c.halls)ls.push({l:'Hallways',v:c.halls});
  if(c.wic)ls.push({l:'Walk-in closets',v:c.wic});
  if(c.misc)ls.push({l:'Other areas',v:c.misc});
  var u=S.uph;
  if(u.ls)ls.push({l:'Loveseat',v:u.ls});
  if(u.sofa)ls.push({l:'Sofa',v:u.sofa});
  if(u.sect)ls.push({l:'Sectional',v:u.sect});
  if(S.tile.sqft)ls.push({l:'Tile & grout',v:S.tile.sqft+' sqft'});
  if(S.lam.sqft)ls.push({l:'Laminate/LVP',v:S.lam.sqft+' sqft'});
  if(S.comm.sqft)ls.push({l:'Commercial carpet',v:S.comm.sqft+' sqft'});
  return ls;
}

function rSum(){
  var el=document.getElementById('asum');
  if(!el)return;
  var ls=areas();
  el.innerHTML=ls.length?ls.map(function(l){return'<div class="al"><span>'+l.l+'</span><span style="font-weight:500">'+l.v+'</span></div>';}).join(''):'<span style="font-size:12px;color:var(--color-text-secondary)">No areas added yet</span>';
}

function sqftQ(k,lbl){
  var o=S[k];
  var h='<div class="sec-t">'+lbl+'</div>';
  h+='<span class="flbl">Does the customer know the area size?</span>';
  h+='<div class="btns">';
  h+='<button class="btn'+(o.know===true?' on':'')+'" onclick="S[\''+k+'\'].know=true;render()"><i class="ti ti-check" aria-hidden="true"></i> Yes — knows sqft</button>';
  h+='<button class="btn'+(o.know===false?' on':'')+'" onclick="S[\''+k+'\'].know=false;render()"><i class="ti ti-help" aria-hidden="true"></i> Not sure</button>';
  h+='</div>';
  if(o.know===true){
    h+='<span class="flbl">Area in sqft</span><input type="text" placeholder="e.g. 350" value="'+(o.sqft||'')+'" oninput="S[\''+k+'\'].sqft=this.value" style="max-width:160px">';
    h+='<p class="note"><i class="ti ti-info-circle" aria-hidden="true"></i> Tech confirms on-site — price adjusts up or down if different.</p>';
  }
  if(o.know===false){
    h+='<div class="gbox" style="margin-top:8px"><span class="box-lbl"><i class="ti ti-ruler" aria-hidden="true"></i> Rough estimate OK</span>Ask for a ballpark — tech measures on arrival. Price adjusts up if more, down if less.</div>';
    h+=sp('"No worries at all! Can you give me a rough idea of the area? Our tech will measure everything when they arrive, so the final price adjusts accordingly — up or down. Fair deal, right?"');
    h+='<span class="flbl">Customer estimate / notes</span><input type="text" placeholder="e.g. about 200-300 sqft or not sure" value="'+(o.sqft||'')+'" oninput="S[\''+k+'\'].sqft=this.value">';
  }
  h+='<hr class="div">';
  return h;
}

function calcWindow(){
  if(!S.sysTime||!S.jobPos||S.jobPos==='1st')return null;
  var parts=S.sysTime.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
  if(!parts)return null;
  var h=parseInt(parts[1]),m=parseInt(parts[2]),ap=parts[3].toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  var end1h=(h+1)%24,end2h=(h+2)%24;
  function fmt(hh,mm){var a=hh>=12?'PM':'AM';var d=hh%12||12;return d+':'+(mm<10?'0':'')+mm+' '+a;}
  return{start:fmt(h,m),end1:fmt(end1h,m),end2:fmt(end2h,m)};
}

var render=function(){
  rp();
  var f=document.getElementById('flow');
  if(S.step===0)s0(f);
  else if(S.step===1)s1(f);
  else if(S.step===2)s2(f);
  else if(S.step===3)s3(f);
  else if(S.step===4)s4(f);
  else if(S.step===5)s5(f);
  else if(S.step===6)s6(f);
  else if(S.step===7)s7(f);
};

function s0(f){
  var nm=S.agent||'[Your Name]';
  var h='<div class="card card-red">';
  h+='<div class="step-hdr"><span class="sn">Step 01</span><h2><i class="ti ti-phone" aria-hidden="true"></i> Greeting</h2><p>Answer warmly within 3 rings</p></div>';
  h+='<div class="slbl"><i class="ti ti-message-circle" aria-hidden="true"></i> Opening greeting</div>';
  h+='<div class="sbox">&ldquo;Thank you for calling Oxi Fresh Carpet Cleaning, this is <span class="nhi" id="sn">'+nm+'</span>! How may I help you today?&rdquo;</div>';
  h+='<div class="tone-bar"><strong><i class="ti ti-heart" aria-hidden="true"></i> Tone reminder</strong><p>Talk like you\'re chatting with a friend — not reading a script. Small talk builds trust. Match their energy. Empathy first, always.</p></div>';
  h+='<span class="flbl"><i class="ti ti-user" aria-hidden="true"></i> Customer name</span>';
  h+=sp('"May I get your name please so I can address you properly?"');
  h+='<div class="r2">';
  h+='<div><span class="flbl">First name</span><input type="text" placeholder="First name" value="'+S.fname+'" oninput="S.fname=this.value"></div>';
  h+='<div><span class="flbl">Last name</span><input type="text" placeholder="Last name (if comfortable)" value="'+S.lname+'" oninput="S.lname=this.value"></div>';
  h+='</div>';
  h+='<div class="ibox" style="margin-top:8px"><span class="box-lbl"><i class="ti ti-info-circle" aria-hidden="true"></i> Name protocol</span>If not comfortable with last name: <em>"No worries! May I at least get your first name so I can address you properly throughout our call?"</em><br>Once you have their name — use it! It makes the call feel personal.</div>';
  h+='<span class="flbl">How did they hear about us?</span>';
  h+='<div class="btns">';
  ['Google','Yelp','Referral','Return customer','Nextdoor','Facebook','Mailer','Other'].forEach(function(x){
    h+='<button class="btn'+(S.howHeard===x?' on':'')+'" onclick="S.howHeard=\''+x+'\';document.querySelectorAll(\'.hw\').forEach(function(b){b.classList.remove(\'on\')});this.classList.add(\'on\')" class="hw">'+x+'</button>';
  });
  h+='</div>';
  h+='<span class="flbl">First time with us?</span>';
  h+='<div class="btns" style="margin-bottom:10px">';
  h+='<button class="btn rt'+(S.isRepeat===false?' on':'')+'" onclick="S.isRepeat=false;document.querySelectorAll(\'.rt\').forEach(function(b){b.classList.remove(\'on\')});this.classList.add(\'on\');render()"><i class="ti ti-star" aria-hidden="true"></i> First time</button>';
  h+='<button class="btn rt'+(S.isRepeat===true?' on':'')+'" onclick="S.isRepeat=true;document.querySelectorAll(\'.rt\').forEach(function(b){b.classList.remove(\'on\')});this.classList.add(\'on\');render()"><i class="ti ti-heart" aria-hidden="true"></i> Welcome back</button>';
  h+='</div>';
  if(S.isRepeat===false)h+=sp('"Awesome, welcome to Oxi Fresh'+(S.fname?' '+S.fname:'')+'! You\'re in the right place — we\'ll take great care of you!"');
  if(S.isRepeat===true)h+=sp('"Oh, welcome back'+(S.fname?' '+S.fname:'')+'! So great to hear from you again! How has everything been?"');
  h+='<span class="flbl">Customer concern / request</span>';
  h+='<textarea placeholder="Note their concern..." oninput="S.concern=this.value">'+S.concern+'</textarea>';
  h+='<div class="btns" style="margin-top:12px"><button class="btn pri" onclick="next()">Continue <i class="ti ti-arrow-right" aria-hidden="true"></i></button></div>';
  h+='</div>';
  f.innerHTML=h;
}

function s1(f){
  var h='<div class="card card-red">';
  h+='<div class="step-hdr"><span class="sn">Step 02</span><h2><i class="ti ti-list" aria-hidden="true"></i> Service type</h2><p>Identify what the customer needs</p></div>';
  h+=sp('"Wonderful'+(S.fname?' '+S.fname:'')+'! So I can get you an accurate quote — what type of service are you looking for today?"');
  h+=ftip('Feel free to add: "Oh carpet cleaning — perfect timing!" Keep it natural and conversational.');
  h+='<div class="btns" style="margin-bottom:14px">';
  [['Carpet cleaning','carpet'],['Upholstery','uph'],['Tile & grout','tile'],['Laminate / LVP','lam'],['Commercial carpet','comm'],['Multiple services','multi']].forEach(function(p){
    h+='<button class="btn sv'+(S.service===p[1]?' on':'')+'" onclick="document.querySelectorAll(\'.sv\').forEach(function(b){b.classList.remove(\'on\')});this.classList.add(\'on\');S.service=\''+p[1]+'\'">'+p[0]+'</button>';
  });
  h+='</div>';

  h+='<button class="btn sec" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true"></i> New call</button>';
  h+='</div>';
  h+='</div>';
